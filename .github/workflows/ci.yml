name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configurar Node.js (para CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint con ruff
        run: ruff check stacks/ app.py

      - name: Verificar formato con ruff
        run: ruff format --check stacks/ app.py

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Synth modo dev (default)
        run: cdk synth

      - name: CDK Synth modo prod (-c prod=true)
        run: cdk synth -c prod=true

      - name: CDK Diff (preview de cambios vs AWS)
        run: cdk diff --all 2>&1 || true
