name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configurar Node.js (para CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint con ruff
        run: ruff check stacks/ app.py

      - name: Verificar formato con ruff
        run: ruff format --check stacks/ app.py

      - name: CDK Synth (validar stacks)
        run: cdk synth
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: fake-key
          AWS_SECRET_ACCESS_KEY: fake-secret

      - name: CDK Diff (preview de cambios vs AWS)
        run: cdk diff --all 2>&1 || true
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || 'fake-key' }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'fake-secret' }}
