name: CDK Deploy

on:
  push:
    branches:
      - deploy
  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de despliegue"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  diff:
    name: CDK Diff (preview)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Instalar dependencias
        run: pip install -q -r requirements.txt -r requirements-dev.txt

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Calcular flags CDK
        id: flags
        run: |
          MODO="${{ github.event.inputs.modo || 'dev' }}"
          if [ "$MODO" = "prod" ]; then
            echo "cdk_flags=-c prod=true" >> $GITHUB_OUTPUT
          else
            echo "cdk_flags=" >> $GITHUB_OUTPUT
          fi
          echo "Modo seleccionado: $MODO"

      - name: CDK Synth
        run: cdk synth ${{ steps.flags.outputs.cdk_flags }}

      - name: CDK Diff (ver qué cambia)
        run: cdk diff --all ${{ steps.flags.outputs.cdk_flags }} 2>&1 || true

  deploy:
    name: CDK Deploy (requiere aprobación)
    needs: diff
    runs-on: ubuntu-latest
    environment: production       # ← pausa aquí, espera tu aprobación en GitHub UI
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Instalar dependencias
        run: pip install -q -r requirements.txt -r requirements-dev.txt

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Calcular flags CDK
        id: flags
        run: |
          MODO="${{ github.event.inputs.modo || 'dev' }}"
          if [ "$MODO" = "prod" ]; then
            echo "cdk_flags=-c prod=true" >> $GITHUB_OUTPUT
          else
            echo "cdk_flags=" >> $GITHUB_OUTPUT
          fi
          echo "Modo seleccionado: $MODO"

      - name: CDK Deploy
        run: cdk deploy --all --require-approval never ${{ steps.flags.outputs.cdk_flags }}
